<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11 - Catarina y cadena</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root { --azul:#1a73e8; --azul-osc:#1557b0; --verde:#137333; --rojo:#c5221f; --borde:#dadce0; --texto:#202124; --sub:#5f6368; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:#f0f4ff; color:var(--texto); min-height:100vh; padding:24px 16px 60px; }
  .quiz-header { max-width:700px; margin:0 auto 20px; background:var(--azul); border-radius:12px 12px 0 0; padding:24px 28px; color:white; }
  .quiz-header h1 { font-family:'DM Serif Display',serif; font-size:22px; font-weight:400; margin-bottom:6px; }
  .quiz-header p  { font-size:13px; opacity:.85; }
  .nombre-card { max-width:700px; margin:0 auto 16px; background:white; border-radius:0 0 8px 8px; border-top:4px solid var(--azul); padding:22px 28px; box-shadow:0 1px 3px rgba(0,0,0,.12); }
  .nombre-card label { font-size:14px; font-weight:500; display:block; margin-bottom:8px; }
  .nombre-card input { width:100%; padding:10px 12px; border:1px solid var(--borde); border-radius:6px; font-family:inherit; font-size:14px; outline:none; }
  .nombre-card input:focus { border-color:var(--azul); }
  .progreso-wrap { max-width:700px; margin:0 auto 16px; display:flex; align-items:center; gap:12px; font-size:12px; color:var(--sub); }
  .progreso-bar  { flex:1; height:4px; background:#e0e0e0; border-radius:2px; overflow:hidden; }
  .progreso-fill { height:100%; background:var(--azul); border-radius:2px; transition:width .4s ease; }
  .pregunta-card { max-width:700px; margin:0 auto 14px; background:white; border-radius:8px; border-left:4px solid transparent; padding:22px 28px; box-shadow:0 1px 3px rgba(0,0,0,.1); transition:border-color .3s; }
  .pregunta-card.activa    { border-left-color:var(--azul); }
  .pregunta-card.correcta  { border-left-color:var(--verde); }
  .pregunta-card.incorrecta{ border-left-color:var(--rojo); }
  .pregunta-num  { font-size:11px; font-weight:600; color:var(--azul); text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; }
  .pregunta-texto{ font-size:15px; font-weight:500; line-height:1.6; margin-bottom:14px; }
  .opciones { display:flex; flex-direction:column; gap:8px; }
  .opcion { display:flex; align-items:center; gap:10px; padding:10px 14px; border:1px solid var(--borde); border-radius:6px; cursor:pointer; transition:background .15s,border-color .15s; font-size:14px; user-select:none; }
  .opcion:hover { background:#f0f4ff; border-color:var(--azul); }
  .opcion input { accent-color:var(--azul); width:16px; height:16px; flex-shrink:0; }
  .opcion.sel   { background:#e8f0fe; border-color:var(--azul); }
  .timer-pregunta { margin-top:12px; font-size:11px; color:var(--sub); display:flex; align-items:center; gap:4px; }
  .timer-pregunta span { font-weight:600; color:var(--texto); }
  .feedback { margin-top:10px; padding:8px 12px; border-radius:6px; font-size:13px; font-weight:500; display:none; }
  .feedback.ok  { background:#e6f4ea; color:var(--verde); }
  .feedback.mal { background:#fce8e6; color:var(--rojo); }
  .enviar-wrap { max-width:700px; margin:20px auto 0; }
  .btn-enviar { background:var(--azul); color:white; border:none; padding:13px 32px; border-radius:6px; font-family:inherit; font-size:15px; font-weight:500; cursor:pointer; transition:background .2s; width:100%; }
  .btn-enviar:hover { background:var(--azul-osc); }
  .btn-enviar:disabled { background:#a8c7fa; cursor:not-allowed; }
  #resultado { display:none; max-width:700px; margin:20px auto; background:white; border-radius:12px; padding:36px 28px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.12); }
  .resultado-emoji{ font-size:48px; margin-bottom:12px; }
  .resultado-cal  { font-family:'DM Serif Display',serif; font-size:52px; color:var(--azul); }
  .resultado-sub  { font-size:14px; color:var(--sub); margin-top:4px; }
  .resultado-stats{ display:flex; justify-content:center; gap:32px; margin:20px 0; }
  .stat { text-align:center; }
  .stat-val { font-size:22px; font-weight:600; }
  .stat-lbl { font-size:11px; color:var(--sub); text-transform:uppercase; letter-spacing:.6px; }
  .resultado-msg  { font-size:13px; color:var(--sub); margin-top:16px; }
  .timer-global { position:fixed; top:12px; right:16px; background:white; border:1px solid var(--borde); border-radius:20px; padding:6px 14px; font-size:13px; font-weight:600; color:var(--texto); box-shadow:0 2px 6px rgba(0,0,0,.1); display:flex; align-items:center; gap:6px; z-index:100; }
</style>
<!-- MathJax para fórmulas matemáticas -->
<script>MathJax = { tex: { inlineMath: [['$','$']] }, svg: { fontCache:'global' } };</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
<div class="timer-global" id="timerGlobal">⏱ <span id="timerGlobalVal">00:00</span></div>
<script>
(function(){
  const p=new URLSearchParams(window.location.search),e=p.get('expira');
  if(!e)return;const f=new Date(e);if(isNaN(f))return;
  if(Date.now()>f.getTime()){
    document.body.innerHTML='';
    document.body.style.cssText='margin:0;padding:0;font-family:sans-serif;background:#f0f4ff;display:flex;align-items:center;justify-content:center;min-height:100vh;';
    document.body.innerHTML='<div style="background:white;border-radius:16px;padding:48px 40px;text-align:center;max-width:440px;box-shadow:0 4px 20px rgba(0,0,0,.12)"><div style="font-size:52px;margin-bottom:16px">🔒</div><h2 style="font-size:24px;color:#202124;margin-bottom:10px">Cuestionario cerrado</h2><p style="font-size:14px;color:#5f6368;line-height:1.6">El período de entrega ha finalizado.<br>Contacta a tu profesor si crees que esto es un error.</p><div style="margin-top:20px;font-size:12px;color:#9aa0a6">Cerrado el: '+f.toLocaleString('es-MX')+'</div></div>';
  }
})();

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxH4jUK8df5oS_IT8Nl5DaB6iJX5ZfTHFiv6sBBRiAr2iGmep5wpswciGXZLA5cITOq/exec";

const CUESTIONARIO = {
  titulo: "11 - Catarina y cadena",
  descripcion: "Lee cada pregunta con atención. El tiempo de cada respuesta se registra automáticamente.",
  preguntas: [
    {
      id: "p1", tipo: "radio",
      texto: "¿Cuál es la principal ventaja de una transmisión de cadena y catarina sobre una de banda y polea en aplicaciones de alta carga?",
      imagen: null,
      opciones: ["La flexibilidad del material", "La ausencia de deslizamiento o patinamiento", "El bajo nivel de ruido a altas velocidades"],
      correcta: "La ausencia de deslizamiento o patinamiento"
    },
    {
      id: "p2", tipo: "radio",
      texto: "¿Cómo se define la relación de transmisión ($i$) en un sistema de catarina y cadena basándose en el número de dientes?",
      imagen: null,
      opciones: ["$i = Z_{salida} / Z_{entrada}$", "$i = D_{entrada} / D_{salida}$", "$i = Z_{entrada} \\times Z_{salida}$"],
      correcta: "$i = Z_{salida} / Z_{entrada}$"
    },
    {
      id: "p3", tipo: "checkbox",
      texto: "¿Cuáles son desventajas características del uso de cadenas y catarinas en comparación con las bandas dentadas?",
      imagen: null,
      opciones: ["Requieren lubricación constante", "Son incapaces de transmitir grandes torques", "Generan mayores niveles de vibración y ruido"],
      correcta: ["Requieren lubricación constante", "Generan mayores niveles de vibración y ruido"],
      puntoPorCorrecta: null, deduccionPorIncorrecta: 0.25
    },
    {
      id: "p4", tipo: "radio",
      texto: "En el cálculo de la ventaja mecánica, si una catarina conductora tiene 12 dientes y la conducida tiene 36, ¿cuál es el torque resultante en el eje de salida en relación al de entrada?",
      imagen: null,
      opciones: ["El torque se reduce a la tercera parte", "El torque se mantiene igual", "El torque se triplica"],
      correcta: "El torque se triplica"
    },
    {
      id: "p5", tipo: "checkbox",
      texto: "¿En qué aspectos son superiores los engranes frente a un sistema de cadena y catarina?",
      imagen: null,
      opciones: ["Capacidad para soportar distancias entre centros muy largas", "Mayor precisión en la sincronización mecánica", "Mayor eficiencia en espacios extremadamente compactos"],
      correcta: ["Mayor precisión en la sincronización mecánica", "Mayor eficiencia en espacios extremadamente compactos"],
      puntoPorCorrecta: null, deduccionPorIncorrecta: 0.25
    },
    {
      id: "p6", tipo: "radio",
      texto: "¿Qué sucede con la velocidad angular ($\\omega$) del eje de salida si la catarina conducida es de mayor diámetro que la catarina motriz?",
      imagen: null,
      opciones: ["La velocidad aumenta proporcionalmente", "La velocidad disminuye", "La velocidad se mantiene constante"],
      correcta: "La velocidad disminuye"
    },
    {
      id: "p7", tipo: "radio",
      texto: "¿Cuál es el propósito principal de un \"tensor\" en una transmisión por cadena?",
      imagen: null,
      opciones: ["Aumentar la relación de transmisión final", "Compensar la elongación por desgaste y evitar que la cadena salte", "Reducir la fricción entre los eslabones"],
      correcta: "Compensar la elongación por desgaste y evitar que la cadena salte"
    },
    {
      id: "p8", tipo: "checkbox",
      texto: "¿Qué factores determinan la selección del paso (pitch) de una cadena para un mecanismo industrial?",
      imagen: null,
      opciones: ["La potencia que se desea transmitir", "El color del acabado del acero", "La velocidad de operación de los ejes"],
      correcta: ["La potencia que se desea transmitir", "La velocidad de operación de los ejes"],
      puntoPorCorrecta: null, deduccionPorIncorrecta: 0.25
    },
    {
      id: "p9", tipo: "radio",
      texto: "¿Cuál es una ventaja crítica de las cadenas sobre las bandas cuando se trabaja en ambientes con altas temperaturas?",
      imagen: null,
      opciones: ["Las cadenas no se estiran con el calor", "El metal resiste mejor la degradación térmica que los polímeros de las bandas", "Las cadenas no requieren ventilación"],
      correcta: "El metal resiste mejor la degradación térmica que los polímeros de las bandas"
    },
    {
      id: "p10", tipo: "checkbox",
      texto: "¿Qué elementos componen la fórmula de la velocidad lineal ($v$) de una cadena?",
      imagen: null,
      opciones: ["El paso de la cadena (P)", "El número de dientes de la catarina (Z)", "El grosor de los eslabones laterales"],
      correcta: ["El paso de la cadena (P)", "El número de dientes de la catarina (Z)"],
      puntoPorCorrecta: null, deduccionPorIncorrecta: 0.25
    }
  ]
};
</script>

<div id="quizContainer"></div>
<div id="resultado">
  <div class="resultado-emoji" id="resEmoji">🎉</div>
  <div class="resultado-cal" id="resCal">—</div>
  <div class="resultado-sub">Calificación</div>
  <div class="resultado-stats">
    <div class="stat"><div class="stat-val" id="resAciertos">—</div><div class="stat-lbl">Aciertos</div></div>
    <div class="stat"><div class="stat-val" id="resTotalP">—</div><div class="stat-lbl">Preguntas</div></div>
    <div class="stat"><div class="stat-val" id="resTiempo">—</div><div class="stat-lbl">Tiempo Total</div></div>
  </div>
  <div class="resultado-msg" id="resMsg"></div>
</div>

<script>
const tiemposPorPregunta={},tiemposInicio={},respuestasAlumno={};
let tiempoInicioExamen=Date.now(),timerGlobalInterval=null,timerPreguntaIntervals={};

function render(){
  const c=CUESTIONARIO,ct=document.getElementById("quizContainer");
  ct.innerHTML="";
  const hdr=document.createElement("div");hdr.className="quiz-header";
  hdr.innerHTML=`<h1>${c.titulo}</h1><p>${c.descripcion}</p>`;ct.appendChild(hdr);
  const nc=document.createElement("div");nc.className="nombre-card";
  nc.innerHTML=`<label for="nAlumno">* Nombre completo</label><input type="text" id="nAlumno" placeholder="Escribe tu nombre y apellidos" required>`;
  ct.appendChild(nc);
  const pw=document.createElement("div");pw.className="progreso-wrap";
  pw.innerHTML=`<div class="progreso-bar"><div class="progreso-fill" id="pFill" style="width:0%"></div></div><span id="pTxt">0 / ${c.preguntas.length}</span>`;
  ct.appendChild(pw);

  c.preguntas.forEach((p,i)=>{
    const card=document.createElement("div");card.className="pregunta-card";card.id="card-"+p.id;
    let ops="";
    if(p.tipo==="verdadero_falso"){
      ops=`<div class="opciones">${["Verdadero","Falso"].map(op=>`<label class="opcion"><input type="radio" name="${p.id}" value="${op}" onchange="sel('${p.id}','${op}','radio')">${op}</label>`).join("")}</div>`;
    } else if(p.tipo==="radio"){
      ops=`<div class="opciones">${p.opciones.map(op=>`<label class="opcion"><input type="radio" name="${p.id}" value="${op}" onchange="sel('${p.id}',${JSON.stringify(op)},'radio')">${op}</label>`).join("")}</div>`;
    } else if(p.tipo==="checkbox"){
      ops=`<div class="opciones">${p.opciones.map(op=>`<label class="opcion"><input type="checkbox" name="${p.id}" value="${op}" onchange="selCb('${p.id}')">${op}</label>`).join("")}</div>`;
    } else {
      ops=`<input class="input-texto" id="txt-${p.id}" placeholder="Escribe tu respuesta..." oninput="sel('${p.id}',this.value,'texto')">`;
    }
    card.innerHTML=`<div class="pregunta-num">Pregunta ${i+1} de ${c.preguntas.length}</div><div class="pregunta-texto">${p.texto}</div>${p.imagen?`<img style="width:100%;max-height:280px;object-fit:contain;border-radius:6px;margin-bottom:14px;border:1px solid var(--borde)" src="${p.imagen}">`:""}${ops}<div class="timer-pregunta">⏱ Tiempo: <span id="tmr-${p.id}">0s</span></div><div class="feedback" id="fb-${p.id}"></div>`;
    card.addEventListener("click",()=>act(p.id));
    ct.appendChild(card);
    const obs=new IntersectionObserver(e=>{if(e[0].isIntersecting){if(!tiemposInicio[p.id])startT(p.id);obs.disconnect();}},{threshold:.5});
    obs.observe(card);
  });

  const ew=document.createElement("div");ew.className="enviar-wrap";
  ew.innerHTML=`<button class="btn-enviar" id="btnEnv" onclick="enviar()">Enviar cuestionario</button>`;
  ct.appendChild(ew);
  tiempoInicioExamen=Date.now();
  timerGlobalInterval=setInterval(()=>{
    const s=Math.floor((Date.now()-tiempoInicioExamen)/1000);
    document.getElementById("timerGlobalVal").textContent=Math.floor(s/60).toString().padStart(2,"0")+":"+(s%60).toString().padStart(2,"0");
  },1000);
  setTimeout(()=>act(c.preguntas[0].id),300);
  // Renderizar fórmulas MathJax
  if(window.MathJax) MathJax.typesetPromise();
}

function act(id){document.querySelectorAll(".pregunta-card").forEach(c=>c.classList.remove("activa"));const card=document.getElementById("card-"+id);if(card){card.classList.add("activa");if(!tiemposInicio[id])startT(id);}}
function startT(id){if(tiemposInicio[id])return;tiemposInicio[id]=Date.now();timerPreguntaIntervals[id]=setInterval(()=>{const s=Math.floor((Date.now()-tiemposInicio[id])/1000);const el=document.getElementById("tmr-"+id);if(el)el.textContent=fmt(s);},1000);}
function stopT(id){if(timerPreguntaIntervals[id]){clearInterval(timerPreguntaIntervals[id]);delete timerPreguntaIntervals[id];}if(tiemposInicio[id])tiemposPorPregunta[id]=Math.floor((Date.now()-tiemposInicio[id])/1000);}
function fmt(s){const m=Math.floor(s/60);return m>0?m+"m "+(s%60)+"s":s+"s";}
function sel(id,v,t){respuestasAlumno[id]=v;updProg();if(!tiemposInicio[id])startT(id);if(t==="radio")document.querySelectorAll('[name="'+id+'"]').forEach(i=>i.closest(".opcion")?.classList.toggle("sel",i.value===v));}
function selCb(id){const ch=document.querySelectorAll('[name="'+id+'"]:checked');respuestasAlumno[id]=Array.from(ch).map(c=>c.value);updProg();document.querySelectorAll('[name="'+id+'"]').forEach(i=>i.closest(".opcion")?.classList.toggle("sel",i.checked));}
function updProg(){const r=CUESTIONARIO.preguntas.filter(p=>{const v=respuestasAlumno[p.id];return v!==undefined&&v!==""&&!(Array.isArray(v)&&v.length===0);}).length,t=CUESTIONARIO.preguntas.length;document.getElementById("pFill").style.width=Math.round(r/t*100)+"%";document.getElementById("pTxt").textContent=r+" / "+t;}

async function enviar(){
  const nombre=document.getElementById("nAlumno").value.trim();
  if(!nombre){alert("Por favor escribe tu nombre completo.");return;}
  CUESTIONARIO.preguntas.forEach(p=>stopT(p.id));
  clearInterval(timerGlobalInterval);
  const tt=Math.floor((Date.now()-tiempoInicioExamen)/1000);
  const btn=document.getElementById("btnEnv");btn.disabled=true;btn.textContent="Enviando...";
  const tipos={},correctas={};
  CUESTIONARIO.preguntas.forEach(p=>{tipos[p.id]=p.tipo==="verdadero_falso"?"radio":p.tipo;correctas[p.id]=p.correcta;});
  let aciertos=0;
  CUESTIONARIO.preguntas.forEach(p=>{
    const resp=respuestasAlumno[p.id],corr=p.correcta,card=document.getElementById("card-"+p.id),fb=document.getElementById("fb-"+p.id);
    if(p.tipo==="texto"){fb.textContent="✏️ Se revisará manualmente.";fb.className="feedback ok";fb.style.display="block";return;}
    if(p.tipo==="checkbox"){
      const ca=Array.isArray(corr)?corr:[],ra=Array.isArray(resp)?resp:[],n=ca.length||1;
      const ppc=p.puntoPorCorrecta!=null?p.puntoPorCorrecta:1/n,ded=p.deduccionPorIncorrecta!=null?p.deduccionPorIncorrecta:0;
      let pts=0;ra.forEach(r=>pts+=ca.includes(r)?ppc:-ded);pts=Math.max(0,Math.min(1,pts));aciertos+=pts;
      if(pts===1){card.classList.add("correcta");fb.textContent="✅ Perfecto";fb.className="feedback ok";}
      else if(pts>0){card.classList.add("activa");fb.textContent="🟡 Parcial ("+Math.round(pts*100)+"%) — Correctas: "+ca.join(", ");fb.className="feedback ok";fb.style.background="#fff8e1";fb.style.color="#b06000";}
      else{card.classList.add("incorrecta");fb.textContent="❌ Incorrecto — Correctas: "+ca.join(", ");fb.className="feedback mal";}
    } else {
      const ok=String(resp||"").trim().toLowerCase()===String(corr||"").trim().toLowerCase();
      if(ok){aciertos++;card.classList.add("correcta");fb.textContent="✅ Correcto";fb.className="feedback ok";}
      else{card.classList.add("incorrecta");fb.textContent="❌ Incorrecto — Correcta: "+(Array.isArray(corr)?corr.join(", "):corr);fb.className="feedback mal";}
    }
    fb.style.display="block";
  });
  try{
    if(APPS_SCRIPT_URL!=="PON_AQUI_LA_URL_DE_TU_APPS_SCRIPT"){
      await fetch(APPS_SCRIPT_URL,{method:"POST",body:JSON.stringify({nombre,tiempoTotal:tt,tiempos:tiemposPorPregunta,respuestas:respuestasAlumno,correctas,tipos,preguntas:CUESTIONARIO.preguntas.map(p=>({id:p.id,texto:p.texto}))}),headers:{"Content-Type":"application/json"},mode:"no-cors"});
    }
  }catch(e){console.warn(e);}
  const tc=CUESTIONARIO.preguntas.filter(p=>p.tipo!=="texto").length,cal=tc>0?Math.round(aciertos/tc*100):0;
  document.getElementById("resCal").textContent=cal+"%";
  document.getElementById("resAciertos").textContent=Number.isInteger(aciertos)?aciertos:aciertos.toFixed(1);
  document.getElementById("resTotalP").textContent=tc;
  document.getElementById("resTiempo").textContent=fmt(tt);
  document.getElementById("resEmoji").textContent=cal>=70?"🎉":cal>=50?"😐":"📚";
  document.getElementById("resMsg").textContent=cal>=70?"¡Excelente trabajo! Tus respuestas han sido registradas.":"Tus respuestas han sido registradas. Sigue practicando.";
  document.getElementById("resultado").style.display="block";
  document.getElementById("resultado").scrollIntoView({behavior:"smooth"});
  btn.textContent="✅ Enviado";
}

render();
</script>
</body>
</html>
